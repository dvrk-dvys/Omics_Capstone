services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5002:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
      - ./mlflow.db:/mlflow.db
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlartifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped
